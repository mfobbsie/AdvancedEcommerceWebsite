<svg
  width="300"
  height="70"
  viewBox="0 0 300 70"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Stitch line (soft grey dashed line) -->
  <line
    x1="20"
    y1="35"
    x2="110"
    y2="35"
    stroke="#3A3A3A"
    stroke-width="2"
    stroke-dasharray="6 4"
    stroke-linecap="round"
  />

  <!-- Spark icon (soft warm gold) -->
  <polygon
    points="130,25 133,33 142,33 135,38 138,46 130,41 122,46 125,38 118,33 127,33"
    fill="#E8B26A"
  />

  <!-- Brand text -->
  <text
    x="160"
    y="32"
    font-family="Georgia, serif"
    font-size="22"
    fill="#3A3A3A"
  >
    stitch
  </text>

  <text
    x="160"
    y="55"
    font-family="Georgia, serif"
    font-size="22"
    fill="#8BAF8A"
  >
    &amp; spark
  </text>
</svg>
